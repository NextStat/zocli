name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-assets:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: zocli-x86_64-unknown-linux-gnu.tar.gz
            package_kind: unix
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: zocli-aarch64-unknown-linux-gnu.tar.gz
            package_kind: unix
          - os: macos-15-intel
            target: x86_64-apple-darwin
            asset: zocli-x86_64-apple-darwin.tar.gz
            package_kind: unix
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: zocli-aarch64-apple-darwin.tar.gz
            package_kind: unix
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: zocli-x86_64-pc-windows-msvc.zip
            package_kind: windows
    steps:
      - uses: actions/checkout@v6
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package Unix asset
        if: matrix.package_kind == 'unix'
        shell: bash
        run: |
          mkdir -p dist
          asset_path="$(sh ./scripts/package-release.sh --target "${{ matrix.target }}" --binary "target/${{ matrix.target }}/release/zocli" --output-dir dist)"
          asset_name="$(basename "$asset_path")"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$asset_path" | awk -v name="$asset_name" '{print $1 "  " name}' > "dist/SHA256SUMS-${{ matrix.target }}"
          else
            sha256sum "$asset_path" | awk -v name="$asset_name" '{print $1 "  " name}' > "dist/SHA256SUMS-${{ matrix.target }}"
          fi
      - name: Package Windows asset
        if: matrix.package_kind == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $stageDir = Join-Path $env:RUNNER_TEMP "zocli-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/zocli.exe" (Join-Path $stageDir "zocli.exe")
          Copy-Item "README.md" (Join-Path $stageDir "README.md")
          Copy-Item "LICENSE" (Join-Path $stageDir "LICENSE")
          $assetPath = Join-Path (Resolve-Path dist) "${{ matrix.asset }}"
          Compress-Archive -Path (Join-Path $stageDir '*') -DestinationPath $assetPath -Force
          $hash = (Get-FileHash -Path $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  ${{ matrix.asset }}" | Out-File -FilePath (Join-Path (Resolve-Path dist) "SHA256SUMS-${{ matrix.target }}") -Encoding ascii
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build-assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Smoke packaged Linux x64 release asset
        shell: bash
        run: |
          asset_path="$(find dist -type f -name 'zocli-x86_64-unknown-linux-gnu.tar.gz' | head -n 1)"
          test -n "$asset_path"
          smoke_dir="$(mktemp -d)"
          trap 'rm -rf "$smoke_dir"' EXIT INT TERM HUP
          tar -xzf "$asset_path" -C "$smoke_dir"
          binary_path="$(find "$smoke_dir" -type f -name zocli | head -n 1)"
          test -n "$binary_path"
          chmod +x "$binary_path"
          sh ./scripts/smoke-product-surface.sh "$binary_path"
      - name: Assemble release checksums
        shell: bash
        run: |
          find dist -type f -name 'SHA256SUMS-*' -print0 \
            | xargs -0 cat \
            | tr -d '\r' \
            | sort > dist/SHA256SUMS
      - name: Generate package-manager assets
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"
          sha_linux_arm64="$(awk '$2 == "zocli-aarch64-unknown-linux-gnu.tar.gz" { print $1 }' dist/SHA256SUMS)"
          sha_linux_x64="$(awk '$2 == "zocli-x86_64-unknown-linux-gnu.tar.gz" { print $1 }' dist/SHA256SUMS)"
          sha_macos_arm64="$(awk '$2 == "zocli-aarch64-apple-darwin.tar.gz" { print $1 }' dist/SHA256SUMS)"
          sha_macos_x64="$(awk '$2 == "zocli-x86_64-apple-darwin.tar.gz" { print $1 }' dist/SHA256SUMS)"
          sha_windows_x64="$(awk '$2 == "zocli-x86_64-pc-windows-msvc.zip" { print $1 }' dist/SHA256SUMS)"

          test -n "$sha_linux_arm64"
          test -n "$sha_linux_x64"
          test -n "$sha_macos_arm64"
          test -n "$sha_macos_x64"
          test -n "$sha_windows_x64"

          sh ./scripts/generate-homebrew-formula.sh \
            --version "$version" \
            --base-url "$base_url" \
            --output dist/zocli.rb \
            --sha256-linux-arm64 "$sha_linux_arm64" \
            --sha256-linux-x64 "$sha_linux_x64" \
            --sha256-macos-arm64 "$sha_macos_arm64" \
            --sha256-macos-x64 "$sha_macos_x64"

          sh ./scripts/generate-winget-manifests.sh \
            --version "$version" \
            --base-url "$base_url" \
            --output-dir dist/winget-manifests \
            --sha256-windows-x64 "$sha_windows_x64"

          (
            cd dist/winget-manifests
            zip -r ../winget-manifests.zip NextStat.zocli
          )
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/zocli-*.tar.gz
            dist/**/zocli-*.zip
            dist/SHA256SUMS
            dist/zocli.rb
            dist/winget-manifests.zip
